# Julow self-hosted stack for a single Beget VPS.
# Bring up with: docker compose --env-file .env up -d --build
services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-julow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-julow}
      POSTGRES_DB: ${POSTGRES_DB:-julow}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-julow}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  migrate:
    build:
      context: .
      dockerfile: Dockerfile.services
    command: ["npx", "prisma", "migrate", "deploy"]
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      HOSTNAME: 0.0.0.0
      PORT: 3000
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: Dockerfile.services
    command: ["npx", "tsx", "services/worker/index.ts"]
    restart: unless-stopped
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  ws:
    build:
      context: .
      dockerfile: Dockerfile.services
    command: ["npx", "tsx", "services/ws/index.ts"]
    restart: unless-stopped
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy

  bot:
    build:
      context: .
      dockerfile: Dockerfile.services
    command: ["npx", "tsx", "services/bot/index.ts"]
    restart: unless-stopped
    env_file: .env
    depends_on:
      - app

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      APP_DOMAIN: ${APP_DOMAIN:-localhost}
      WS_DOMAIN: ${WS_DOMAIN:-ws.localhost}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddydata:/data
      - caddyconfig:/config
    depends_on:
      - app
      - ws

volumes:
  pgdata:
  redisdata:
  caddydata:
  caddyconfig:
